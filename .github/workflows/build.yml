name: Build and deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml jinja2

      - name: Fetch Core commits
        run: python scripts/fetch_core.py

      - name: Fetch Gutenberg PRs
        run: python scripts/fetch_gutenberg.py

      - name: Scrape wp.org profiles
        run: python scripts/scrape_profiles.py

      - name: Verify GitHub Sponsors
        run: python scripts/verify_sponsors.py

      - name: Build site
        run: python scripts/build_site.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
