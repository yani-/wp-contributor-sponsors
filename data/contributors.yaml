# Hand-curated mapping of wp.org handles to sponsor destinations.
#
# Each entry is keyed by the wp.org handle (lowercase). Fields:
#   name:              Display name (optional; falls back to wp.org handle)
#   github:            GitHub username (used for avatar + to join Gutenberg PR data)
#   github_sponsors:   true if a github.com/sponsors/{github} page exists (verify manually)
#   open_collective:   slug on opencollective.com/{slug}
#   ko_fi:             slug on ko-fi.com/{slug}
#   buy_me_a_coffee:   slug on buymeacoffee.com/{slug}
#   liberapay:         slug on liberapay.com/{slug}
#   patreon:           slug on patreon.com/{slug}
#   website:           personal site
#   employer:          current employer (displayed as secondary metadata, never headline)
#
# Start minimal and honest. Only fill fields you can verify. Contributors
# can submit PRs to add their own sponsor links.

